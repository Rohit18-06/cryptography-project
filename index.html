<!DOCTYPE html>
<html lang="en">

<head>
  <title>Cryptography Toolkit</title>

  <style>
    body {
      font-family: Arial;
      background: #f5efe6;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .nav button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #2e7d32;
      color: white;
    }

    .box {
      display: none;
      background: #fff;
      padding: 25px;
      margin: 20px auto;
      width: 400px;
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .15);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button.action {
      background: #7b1fa2;
      color: white;
    }

    #log .msg {
      margin: 6px;
      padding: 8px;
      border-radius: 6px;
    }

    .safe {
      background: #e8f5e9;
    }

    .attack {
      background: #ffebee;
    }
  </style>
</head>

<body>

  <h1>🔐 Cryptography Toolkit</h1>

  <div class="nav">
    <button onclick="show('caesar')">Caesar Cipher</button>
    <button onclick="show('rail')">Rail Fence</button>
    <button onclick="show('mitm')">MITM Attack</button>
  </div>

  <!-- CAESAR -->
  <div id="caesar" class="box">
    <h2>Caesar Cipher</h2>
    <input id="c_text" placeholder="Enter text">
    <input id="c_shift" type="number" placeholder="Shift">
    <br>
    <button class="action" onclick="cEncrypt()">Encrypt</button>
    <button class="action" onclick="cDecrypt()">Decrypt</button>
    <p id="c_out"></p>
  </div>

  <!-- RAIL -->
  <div id="rail" class="box">
    <h2>Rail Fence Cipher</h2>
    <input id="r_text" placeholder="Enter text">
    <input id="r_rails" type="number" placeholder="Rails">
    <br>
    <button class="action" onclick="rEncrypt()">Encrypt</button>
    <button class="action" onclick="rDecrypt()">Decrypt</button>
    <p id="r_out"></p>
  </div>

  <!-- MITM -->
  <div id="mitm" class="box">
    <h2>MITM Simulation</h2>
    <input id="m_msg" value="Hello Bob! Transfer $500">
    <br>
    <button class="action" onclick="simulate()">Simulate</button>
    <div id="log"></div>
  </div>

  <script>

    // NAVIGATION
    function show(id) {
      document.querySelectorAll('.box').forEach(b => b.style.display = 'none');
      document.getElementById(id).style.display = 'block';
    }

    // DEFAULT
    show('caesar');

    // CAESAR
    function caesar(text, shift) {
      return text.split('').map(ch => {
        if (/[a-z]/i.test(ch)) {
          let base = ch === ch.toUpperCase() ? 65 : 97;
          return String.fromCharCode((ch.charCodeAt(0) - base + shift + 26) % 26 + base);
        }
        return ch;
      }).join('');
    }

    function cEncrypt() {
      let t = document.getElementById('c_text').value;
      let s = +document.getElementById('c_shift').value;
      document.getElementById('c_out').innerText = "Encrypted: " + caesar(t, s);
    }

    function cDecrypt() {
      let t = document.getElementById('c_text').value;
      let s = +document.getElementById('c_shift').value;
      document.getElementById('c_out').innerText = "Decrypted: " + caesar(t, -s);
    }

    // RAIL
    function railEncrypt(text, rails) {
      if (rails <= 1) return text;
      let f = Array.from({ length: rails }, () => []);
      let r = 0, d = 1;
      for (let ch of text) {
        f[r].push(ch);
        r += d;
        if (r == 0 || r == rails - 1) d *= -1;
      }
      return f.flat().join('');
    }

    function railDecrypt(cipher, rails) {
      let n = cipher.length, p = [], r = 0, d = 1;
      for (let i = 0; i < n; i++) {
        p.push(r);
        r += d;
        if (r == 0 || r == rails - 1) d *= -1;
      }
      let s = [...p.keys()].sort((a, b) => p[a] - p[b]);
      let res = Array(n);
      cipher.split('').forEach((c, i) => res[s[i]] = c);
      return res.join('');
    }

    function rEncrypt() {
      let t = document.getElementById('r_text').value;
      let r = +document.getElementById('r_rails').value;
      document.getElementById('r_out').innerText = "Encrypted: " + railEncrypt(t, r);
    }

    function rDecrypt() {
      let t = document.getElementById('r_text').value;
      let r = +document.getElementById('r_rails').value;
      document.getElementById('r_out').innerText = "Decrypted: " + railDecrypt(t, r);
    }

    // MITM
    function simulate() {
      let msg = document.getElementById('m_msg').value;
      let mod = msg.replace(/\$\d+/, "$5000").replace(/hello/i, "HACKED!");
      document.getElementById('log').innerHTML = `
    <p class='msg safe'>Alice: ${msg}</p>
    <p class='msg attack'>Intercepted</p>
    <p class='msg attack'>Modified: ${mod}</p>
    <p class='msg safe'>Bob: ${mod}</p>
  `;
    }

  </script>

</body>

</html>
